services:
  claude:
    build:
      context: .
      args:
        - EXTRA_PACKAGES=${EXTRA_PACKAGES}
    image: claude:latest
    volumes:
      - ${CLAUDE_DIR:-~/.claude}:/home/ubuntu/.claude
      - ${CLAUDE_JSON:-~/.claude.json}:/home/ubuntu/.claude.json
      - ${PROJECT}:/home/ubuntu/${PROJECT_NAME:-project}
    working_dir: /home/ubuntu/${PROJECT_NAME:-project}
    stdin_open: true
    tty: true